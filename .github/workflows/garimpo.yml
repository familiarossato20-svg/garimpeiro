name: Garimpo Diário

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scraper-action.js'
      - '.github/workflows/garimpo.yml'

jobs:
  garimpar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scraper-action.js
        env:
          RAILWAY_URL: https://garimpeiro-production.up.railway.app

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garimpo-results
          path: resultados/
          retention-days: 7
